file:
  client-path: /file
  storage-location: D:\ite\
  base-uri: http://localhost:${server.port}${file.client-path}/

server:
  port: 8080



spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ite_ecommerce_db
    username: postgres
    password: qwer


  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true